        const lstContainer = document.getElementById("lstContainer");
        const lblCount = document.getElementById("lblCount");
        const txtSearch = document.getElementById("txtSearch");

        function renderPapers(data) {
            lstContainer.innerHTML = "";
            if (data.length === 0) {
                lstContainer.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 3rem; background: var(--card-bg); border-radius: 12px; border: 1px dashed var(--card-border);">没有匹配的文献</div>`;
                lblCount.innerText = `已匹配 0 篇文献`;
                return;
            }

            lblCount.innerText = `已匹配 ${data.length} 篇文献`;
            data.forEach(p => {
                const card = document.createElement("div");
                card.className = "paper-card";
                
                const kwHtml = p.keywords.map(k => `<span class="kw-tag">${k}</span>`).join("");
                
                card.innerHTML = `
                    <h4 class="paper-title">${p.id}. ${p.title}</h4>
                    <div class="paper-meta">
                        <span><strong>期刊与日期:</strong> ${p.journal}</span>
                        <span><strong>主要作者:</strong> ${p.authors}</span>
                        <span><strong>PMID:</strong> <a href="https://pubmed.ncbi.nlm.nih.gov/${p.pmid}" target="_blank" class="pmid-link">${p.pmid}</a></span>
                    </div>
                    <div class="kw-row">${kwHtml}</div>
                    <div class="abstract-box">${formatAbstract(p.abstract)}</div>
                `;
                lstContainer.appendChild(card);
            });
        }

        function formatAbstract(text) {
            return text
                .replace(/(目的：|OBJECTIVE:)/g, '<strong class="highlight">$1</strong>')
                .replace(/(方法：|METHODS:)/g, '<strong class="highlight">$1</strong>')
                .replace(/(结果：|RESULTS:)/g, '<strong class="highlight">$1</strong>')
                .replace(/(结论：|CONCLUSIONS:|CONCLUSION:)/g, '<strong class="highlight">$1</strong>')
                .replace(/(背景：|BACKGROUND:)/g, '<strong class="highlight">$1</strong>');
        }

        renderPapers(papersData);

        // 检索输入监听
        txtSearch.addEventListener("input", (e) => {
            const query = e.target.value.trim().toLowerCase();
            if (!query) {
                renderPapers(papersData);
                return;
            }
            const filtered = papersData.filter(p => {
                return p.title.toLowerCase().includes(query) || 
                       p.authors.toLowerCase().includes(query) || 
                       p.pmid.includes(query) || 
                       p.abstract.toLowerCase().includes(query) || 
                       p.keywords.some(k => k.toLowerCase().includes(query));
            });
            renderPapers(filtered);
        });
    </script>
